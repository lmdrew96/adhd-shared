name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Typecheck, build, smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Smoke — mcp-kit
        run: pnpm --filter @adhdesigns/mcp-kit smoke

      - name: Smoke — clerk
        run: pnpm --filter @adhdesigns/clerk smoke

  examples:
    name: Typecheck examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck mcp-kit examples
        run: pnpm --filter @adhdesigns/mcp-kit typecheck:examples

      - name: Typecheck clerk examples
        run: pnpm --filter @adhdesigns/clerk typecheck:examples
